---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: llmsafespaces
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/lenaxia/LLMSafeSpaces.git
  ref:
