---
# Source of truth for the cluster's desired state.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: llmsafespaces-ops
  namespace: flux-system
spec:
  interval: 2m
  url: "https://github.com/lenaxia/llmsafespaces-ops-prod.git"
  ref:
    branch: "main"
  ignore: |
    /*
    !/kubernetes
---
# `cluster` bootstraps: applies kubernetes/flux which recursively
# includes config/ (this file's siblings), repositories/, and vars/.
# NO postBuild substitution here — vars/ creates the cluster-settings
# ConfigMap that downstream Kustomizations consume, so this bootstrap
# stage must work without it.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster
  namespace: flux-system
spec:
  interval: 2m
  path: ./kubernetes/flux
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# `cluster-apps` applies kubernetes/apps/ with full postBuild substitution
# from cluster-settings + cluster-config. Depends on `cluster` completing
# so those ConfigMaps exist first.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: cluster
  path: ./kubernetes/apps
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: ConfigMap
        name: cluster-config
      - kind: Secret
        name: cluster-secrets
        optional: true
