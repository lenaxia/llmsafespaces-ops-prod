---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    # node-exporter needs hostPath, hostNetwork, hostPID → privileged.
    # Rest of the vmstack pods are baseline-compatible, but PSA enforce
    # is per-namespace, not per-pod, so we go privileged.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
