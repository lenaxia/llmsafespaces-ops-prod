# Alertmanager configuration Secret.
# Encrypted with SOPS (age recipient in .sops.yaml).
# Decrypted by Flux's kustomize-controller at apply time.
#
# The vm-stack chart's Alertmanager subchart mounts this Secret
# (referenced via `alertmanager.spec.configSecret: alertmanager-config`
# in the chart HelmRelease).
#
# Routes:
#   - default: goes to both slack + pushover (with pushover only for
#     critical severity to avoid mobile notification spam)
#   - Dead-man's switch: a Watchdog alert fires continuously; if it
#     STOPS firing, Alertmanager itself is broken. We forward Watchdog
#     to Slack only (Pushover would spam).
#
# Slack webhook URL and Pushover credentials are placeholders below.
# Before this file is useful, do:
#   sops kubernetes/apps/monitoring/alertmanager/alertmanager-config.sops.yaml
# and replace the placeholder values.
