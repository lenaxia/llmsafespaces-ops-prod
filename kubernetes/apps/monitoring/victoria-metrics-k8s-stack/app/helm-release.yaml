---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.35.3
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  install:
    remediation:
      retries: 3
    timeout: 25m
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
    timeout: 25m
    crds: CreateReplace
  values:
    # VictoriaMetrics single-node — good for our scale (< 1M series).
    # Migrate to vmcluster if we outgrow this.
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "30d"
        replicaCount: 1
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        storage:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
          storageClassName: gp3

    # vmagent scrapes ServiceMonitor + PodMonitor + VMServiceScrape targets
    # and remote-writes to vmsingle.
    vmagent:
      enabled: true
      spec:
        replicaCount: 1
        selectAllByDefault: true
        # Enable both Prometheus-native ServiceMonitor/PodMonitor CRDs
        # AND VictoriaMetrics' VMServiceScrape (chart supports both).
        serviceScrapeSelector: {}
        podScrapeSelector: {}
        probeSelector: {}
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi

    # vmalert evaluates PrometheusRule CRDs (and native VMRule) and pushes
    # alerts to Alertmanager.
    vmalert:
      enabled: true
      spec:
        replicaCount: 1
        # By default it evaluates all VMRule + PrometheusRule in-cluster.
        selectAllByDefault: true
        evaluationInterval: 30s
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi

    # Alertmanager: bundled and configured to talk to our alertmanager
    # config (see alertmanager-config.yaml). Chart lets us disable the
    # bundled config and mount our own via alertmanagerSpec.configSecret.
    alertmanager:
      enabled: true
      # Use our own config Secret (created by alertmanager-config.sops.yaml)
      # rather than the chart's default.
      spec:
        replicaCount: 1
        # ConfigSecret name — Flux applies alertmanager-config.sops.yaml
        # (decrypted by kustomize-controller via SOPS) which creates this
        # Secret in the same namespace.
        configSecret: alertmanager-config
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi

    # Grafana — dashboards for VictoriaMetrics.
    grafana:
      enabled: true
      admin:
        # Password comes from an ExternalSecret in ops-prod.
        # See grafana-externalsecret.yaml.
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      # Grafana OSS built-in auth is fine; disable anonymous.
      grafana.ini:
        auth:
          disable_login_form: false
          disable_signout_menu: false
        auth.anonymous:
          enabled: false
        security:
          # cookie_secure requires HTTPS at the edge (ALB).
          cookie_secure: true
          cookie_samesite: lax
        server:
          # Reflects the actual URL the ALB will publish. Substituted
          # from cluster-config.
          #
          # NB: Grafana's hostname is deliberately a first-level subdomain
          # under the zone (safespaces-grafana.thekao.cloud) rather than
          # a nested one (grafana.safespaces.thekao.cloud) so it fits
          # Cloudflare's Universal SSL wildcard (*.thekao.cloud). Free
          # tier Universal SSL only covers apex + one wildcard level.
          # Nested subdomains would need an Advanced Certificate order
          # (Zone:SSL:Edit token permission required).
          root_url: "https://${GRAFANA_HOST}"
      persistence:
        enabled: true
        size: 5Gi
        storageClassName: gp3
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: alb
        # Grafana's own hostname on the ALB. Deliberately a first-level
        # subdomain under thekao.cloud so it fits Cloudflare Universal
        # SSL's `*.thekao.cloud` wildcard — nested subdomains like
        # `grafana.safespaces.thekao.cloud` would need a paid Advanced
        # Certificate order. See the comment on grafana.ini.server.root_url
        # above for the full reasoning.
        #
        # ACM cert (imported via cdk.context.json:certificateArn) is
        # requested with SAN safespaces-grafana.thekao.cloud so the ALB
        # can present a valid cert to Cloudflare's origin fetch.
        hosts:
          - "${GRAFANA_HOST}"
        annotations:
          kubernetes.io/ingress.class: alb
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
          alb.ingress.kubernetes.io/ssl-redirect: '443'
          alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERT_ARN}"
          alb.ingress.kubernetes.io/healthcheck-path: /api/health
          # Group the Grafana ALB with the main llmsafespaces ALB via
          # the same target group / ALB. Saves ~$16/mo of a second ALB.
          alb.ingress.kubernetes.io/group.name: llmsafespaces
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Node metrics.
    nodeExporter:
      enabled: true

    # Cluster-state metrics (Deployments, Nodes, Pods, etc.).
    kubeStateMetrics:
      enabled: true

    # EKS-managed components — their metrics endpoints aren't exposed
    # to the cluster, so both scraping and default alerts must be
    # disabled to avoid a permanent stream of false-positive "Down" alerts.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false

    # Chart-shipped default alerts (Kubernetes-level). Good baseline.
    defaultRules:
      create: true
      # We already disable the corresponding kubeControllerManager /
      # kubeScheduler / kubeProxy / kubeEtcd `enabled: false` above,
      # so rules that use metrics-not-collected won't fire. Keeping
      # these explicit toggles as belt & suspenders.
      rules:
        # Alertmanager rules — the chart emits AlertmanagerFailedToSendAlerts
        # on Slack/Pushover send failures. That's expected during the
        # placeholder-URL period + intermittently under load. Enable
        # once we have real destinations working.
        alertmanager: false
        etcd: false
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: true
        kubeApiserverHistogram: true
        kubeApiserverSlos: true
        kubelet: true
        kubeProxy: false
        kubernetesApps: true
        kubernetesResources: true
        kubernetesStorage: true
        kubernetesSystem: true
        kubeScheduler: false
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: false
        prometheusOperator: false
