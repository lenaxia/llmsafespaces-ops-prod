---
# Deploy VictoriaMetrics + Alertmanager + Grafana + node-exporter +
# kube-state-metrics as a single stack.
#
# Depends on external-secrets so the grafana-admin ExternalSecret can
# materialize.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-monitoring-vmstack
  namespace: flux-system
spec:
  targetNamespace: monitoring
  commonMetadata:
    labels:
      app.kubernetes.io/name: victoria-metrics-k8s-stack
  dependsOn:
    - name: cluster-external-secrets-store
  path: ./kubernetes/apps/monitoring/victoria-metrics-k8s-stack/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  wait: true
  interval: 30m
  timeout: 20m
  retryInterval: 2m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  # HR values reference ${DOMAIN} and ${ACM_CERT_ARN} (Grafana ingress
  # host + ALB cert). Without this postBuild block, Flux applies the
  # HR with the literal string "${DOMAIN}" — the chart renders an
  # Ingress with an invalid RFC1123 host and helm-controller wedges
  # into a rollback loop that can't complete because the target
  # revision references a since-removed ConfigMap. Learned during
  # 2026-07-02 session-5 recovery.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: victoria-metrics-k8s-stack
      namespace: monitoring
