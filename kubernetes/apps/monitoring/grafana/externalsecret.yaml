---
# Grafana admin user + password materialized from Secrets Manager.
# The SM secret `llmsafespaces/grafana-admin` must be created
# out-of-band with JSON `{"admin-user":"admin","admin-password":"<pwd>"}`.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-sm
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: llmsafespaces/grafana-admin
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: llmsafespaces/grafana-admin
        property: admin-password
