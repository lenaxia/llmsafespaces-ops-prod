---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: 6.24.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Single-binary mode: one Loki process; filesystem storage. Good for
    # <100 GiB/month log volume. Switch to distributed mode when we
    # outgrow this.
    deploymentMode: SingleBinary

    loki:
      # Auth off — single-tenant deploy. No X-Scope-OrgID header needed.
      auth_enabled: false
      # PVC-backed filesystem storage. Alternative: S3 backend.
      # Set storageClassName so gp3 EBS is used (chart default is nil
      # which means the cluster default, which we've set to gp3
      # anyway).
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      # Retention: 30 days. Adjust for storage budget.
      limits_config:
        retention_period: 720h  # 30d
        allow_structured_metadata: true
      storage:
        type: filesystem
      # Compaction runs in the single binary; enables retention.
      compactor:
        working_directory: /var/loki/compactor
        retention_enabled: true
        delete_request_store: filesystem

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 50Gi
        storageClass: gp3
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

    # Turn off subcharts we don't need in single-binary mode.
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0

    # Chunks cache — small memcached; can disable for very small deploys.
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Test framework — off.
    test:
      enabled: false
    lokiCanary:
      enabled: false

    # Gateway (nginx front-door) — off; use the Service directly.
    gateway:
      enabled: false

    # Monitoring — expose /metrics; the vmagent scrapes ServiceMonitor.
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      serviceMonitor:
        enabled: true
