---
# ClusterSecretStore wires external-secrets-operator to AWS Secrets
# Manager via the IRSA role configured on the operator's ServiceAccount.
#
# Region comes from the cluster-settings ConfigMap (postBuild substitution).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-sm
spec:
  provider:
    aws:
      service: SecretsManager
      region: "${AWS_REGION}"
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
