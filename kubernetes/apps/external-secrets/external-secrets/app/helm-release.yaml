---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      version: 0.10.5
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    installCRDs: true
    # HA: 2 replicas of each controller (see pdb.yaml for PDBs).
    replicaCount: 2
    webhook:
      create: true
      replicaCount: 2
    certController:
      create: true
      replicaCount: 2
    serviceAccount:
      annotations:
        # IRSA role ARN materialized by CDK and exposed via the
        # cluster-config ConfigMap (substituted at apply time by Flux's
        # postBuild). See lenaxia/llmsafespaces-aws-cdk lib/cluster-stack.ts.
        eks.amazonaws.com/role-arn: "${EXTERNAL_SECRETS_ROLE_ARN}"
    bitwarden:
      enabled: false
