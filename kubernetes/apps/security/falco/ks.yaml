---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-security-falco
  namespace: flux-system
spec:
  targetNamespace: security
  commonMetadata:
    labels:
      app.kubernetes.io/name: falco
  # Falco → falcosidekick → Alertmanager. Depends on Alertmanager
  # being up (part of vm-stack).
  dependsOn:
    - name: cluster-monitoring-vmstack
  path: ./kubernetes/apps/security/falco/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  wait: true
  interval: 30m
  timeout: 15m
  retryInterval: 2m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: falco
      namespace: security
