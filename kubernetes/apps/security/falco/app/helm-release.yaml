---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: 9.1.0
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
    timeout: 15m
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
    timeout: 15m
  values:
    # Kernel driver: modern-bpf (CO-RE eBPF) — no kernel headers needed,
    # works on any modern kernel including AL2023. This is the default
    # and recommended for production.
    driver:
      kind: modern-bpf

    # Falco is a DaemonSet — runs on every node.
    tty: true

    # Ship events to Falcosidekick for alert routing.
    falcosidekick:
      enabled: true
      webui:
        enabled: false  # Skip the WebUI to keep resource footprint small.
      config:
        # Alertmanager is our alert fanout hub. Falco events → Alertmanager
        # → Slack/Pushover via the same routing rules.
        alertmanager:
          hostport: "http://vmalertmanager-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:9093"
          # Only send warning+ to alertmanager to avoid firehose.
          minimumpriority: warning

    # Enable extra rulesets:
    #   - k8s_audit — needs k8s audit-log webhook (skip, EKS audit is in CW)
    #   - application — includes crypto-mining rules ✓
    collectors:
      enabled: true
      containerd:
        enabled: true
      docker:
        enabled: false
      crio:
        enabled: false
      kubernetes:
        enabled: false  # EKS API audit is CloudWatch-based.

    # Custom rules for workspace pods.
    customRules:
      llmsafespaces_workspace_rules.yaml: |
        # Rules specific to the llmsafespaces workspace pods.
        #
        # Priority levels:
        #   emergency, alert, critical, error, warning, notice, informational

        # Match workspace pods by their K8s namespace only. Label-based
        # matching runs into Falco's parser choking on the '/' in
        # `k8s.pod.label.app.kubernetes.io/name`, so we use the
        # namespace instead. Chart runs workspaces in `llmsafespaces`
        # namespace alongside api/controller/frontend; downside is
        # api/controller/frontend also match. Acceptable — those pods
        # shouldn't be running crypto miners either.
        - macro: workspace_pod
          condition: k8s.ns.name = "llmsafespaces"

        # Crypto-mining process names.
        - list: crypto_miner_binaries
          items: [xmrig, ethminer, ccminer, cgminer, sgminer, cpuminer,
                  minerd, phoenixminer, teamredminer, nbminer, t-rex,
                  gminer, lolminer, bminer, srbminer, xmr-stak]

        - rule: Workspace pod running crypto miner
          desc: >
            Detect known crypto miner binary running inside a workspace
            pod. Overrides default priority to critical because our
            workspace tenants aren't trusted.
          condition: >
            spawned_process
            and workspace_pod
            and (proc.name in (crypto_miner_binaries)
                 or proc.cmdline contains "stratum+tcp"
                 or proc.cmdline contains "mining.pool")
          output: >
            Crypto miner detected in workspace
            (workspace=%k8s.pod.name proc=%proc.name cmdline=%proc.cmdline
             user=%user.name container=%container.id)
          priority: CRITICAL
          tags: [workspace, cryptomining, mitre_impact]

        - rule: Workspace pod outbound to mining pool
          desc: >
            Detect a workspace pod connecting to a well-known crypto
            mining pool port.
          condition: >
            outbound
            and workspace_pod
            and (fd.sport in (3333, 4444, 5555, 7777, 8888, 9999))
            and (fd.sip.name contains "pool" or fd.sip.name contains "mine")
          output: >
            Workspace pod connecting to mining pool
            (workspace=%k8s.pod.name dest=%fd.sip.name:%fd.sport container=%container.id)
          priority: WARNING
          tags: [workspace, cryptomining, network]

    # Resource requests: Falco is a DaemonSet so we care per-node.
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    # Tolerate any taint so Falco runs on every node.
    tolerations:
      - operator: Exists

    # Load default rules + our custom rules.
    falcoctl:
      artifact:
        install:
          enabled: true
        follow:
          enabled: true
      config:
        artifact:
          install:
            refs:
              - falco-rules:latest
          follow:
            refs:
              - falco-rules:latest

    falco:
      # Load default rules + our custom rules.
      # Chart 9.x + Falco 0.44 has engine version 0.57 (matches
      # what falcoctl pulls for :latest rules).
      #
      # Standard events go to stdout for cluster log capture.
      stdoutOutput:
        enabled: true
      jsonOutput: true
      jsonIncludeOutputProperty: true
      httpOutput:
        enabled: false
      # Priority threshold — anything below this is dropped at source.
      # Default = debug; bump to notice to reduce volume.
      priority: notice
