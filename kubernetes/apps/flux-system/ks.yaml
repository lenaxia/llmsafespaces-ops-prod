---
# PDBs for Flux controllers. Flux itself is installed by CDK (ClusterStack).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-flux-pdbs
  namespace: flux-system
spec:
  path: ./kubernetes/apps/flux-system/pdbs
  prune: true
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  wait: true
  interval: 30m
  timeout: 2m
  retryInterval: 1m
