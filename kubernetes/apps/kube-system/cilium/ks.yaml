---
# Cilium is the pod-network CNI + kube-proxy replacement + network
# policy engine + FQDN egress enforcer. It replaces the default
# EKS-provided aws-node (VPC CNI) and kube-proxy DaemonSets.
#
# This Kustomization applies ONLY the HelmRelease. Cluster-wide policy
# resources (CiliumNetworkPolicy / CiliumClusterwideNetworkPolicy) live
# with the workloads they protect (see
# kubernetes/apps/llmsafespaces/llmsafespaces/policy/).
#
# Migration procedure and rollback are in
# docs/runbooks/cilium-migration.md — this Kustomization assumes the
# migration has already been performed (aws-node and kube-proxy
# DaemonSets already deleted; nodes already cycled). Flux only owns
# steady-state reconciliation.
#
# wait=true + healthChecks: block downstream Kustomizations (which
# might create CiliumNetworkPolicy CRs) until the HelmRelease is Ready.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-kube-system-cilium
  namespace: flux-system
spec:
  targetNamespace: kube-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
  path: ./kubernetes/apps/kube-system/cilium/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  # NB: wait/healthChecks intentionally NOT set here. The HelmRelease
  # ships with spec.suspend=true (see helm-release.yaml) and will stay
  # that way until the migration completes; wait+healthChecks would
  # cause the Kustomization to hang forever during migration prep.
  #
  # Downstream Kustomizations (cluster-llmsafespaces-policy) that need
  # cilium actually running set their own healthChecks against the HR
  # rather than relying on the Kustomization dependency alone.
  interval: 30m
  timeout: 5m
  retryInterval: 2m
  # ${KUBERNETES_API_HOST} in helm-release.yaml gets substituted from
  # the cluster-config ConfigMap (CDK-managed). Without this postBuild
  # block, Flux would apply the HR with the literal string
  # "${KUBERNETES_API_HOST}" in values.k8sServiceHost, and the cilium
  # agent would crashloop on "host must be a URL or a host:port pair"
  # (learned this the hard way on 2026-07-02).
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
