---
# Stage 1: Materialize the ExternalSecret. The chart's pre-install hook
# would race a fresh-generated K8s Secret otherwise, so this lands
# first and HelmRelease waits on it.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmsafespaces-credentials-externalsecret
  namespace: flux-system
spec:
  targetNamespace: llmsafespaces
  path: ./kubernetes/apps/llmsafespaces/llmsafespaces/externalsecret
  prune: true
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: cluster-external-secrets-store
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: ConfigMap
        name: cluster-config
  healthChecks:
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      name: llmsafespaces-credentials
      namespace: llmsafespaces
---
# Stage 2: Deploy the chart + workarounds.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-llmsafespaces
  namespace: flux-system
spec:
  targetNamespace: llmsafespaces
  commonMetadata:
    labels:
      app.kubernetes.io/name: llmsafespaces
  dependsOn:
    - name: llmsafespaces-credentials-externalsecret
    - name: cluster-cert-manager
  path: ./kubernetes/apps/llmsafespaces/llmsafespaces/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 15m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: ConfigMap
        name: cluster-config
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: llmsafespaces
      namespace: llmsafespaces
---
# Stage 3: CiliumNetworkPolicy for workspace egress. Split from the
# chart Kustomization so we can:
#   1. Depend on Cilium's HelmRelease (policy engine must exist before
#      we create CNP resources or the API server rejects them).
#   2. Manage the policy lifecycle separately — a bad rule set can be
#      rolled back without touching the chart.
#
# The chart itself ships a stock NetworkPolicy (networkPolicy.enabled=true
# in values), which Cilium enforces natively. This adds the
# Cilium-specific FQDN egress on top.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-llmsafespaces-policy
  namespace: flux-system
spec:
  targetNamespace: llmsafespaces
  commonMetadata:
    labels:
      app.kubernetes.io/name: llmsafespaces
      app.kubernetes.io/component: policy
  dependsOn:
    - name: cluster-llmsafespaces
    - name: cluster-kube-system-cilium
  path: ./kubernetes/apps/llmsafespaces/llmsafespaces/policy
  prune: true
  sourceRef:
    kind: GitRepository
    name: llmsafespaces-ops
  wait: true
  interval: 30m
  retryInterval: 2m
  timeout: 5m
  # cluster-kube-system-cilium reports Ready as soon as the manifests
  # are applied, but the Cilium HelmRelease is created suspended and
  # only becomes Ready post-migration. Explicit healthCheck here so
  # this Kustomization stays pending until the operator un-suspends.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cilium
      namespace: kube-system
