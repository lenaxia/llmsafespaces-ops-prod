---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmsafespaces
  namespace: llmsafespaces
spec:
  interval: 30m
  chart:
    spec:
      chart: ./charts/llmsafespaces
      sourceRef:
        kind: GitRepository
        name: llmsafespaces
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 3
    timeout: 10m
    # The chart's RuntimeEnvironment CR creation goes through a
    # validating webhook that the controller serves. On a fresh
    # install the controller pod isn't ready yet → webhook 503.
    # Set failurePolicy=Ignore (via values below) and the chart
    # accepts the CR; webhook reattaches once controller is up.
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
    timeout: 10m
  # The K8s Secret this chart depends on (llmsafespaces-credentials)
  # is materialized by the ExternalSecret in a prior Flux Kustomization
  # stage; see ks.yaml `llmsafespaces-credentials-externalsecret` and
  # `cluster-llmsafespaces` dependsOn chain. HelmRelease.dependsOn
  # is for other HelmReleases, not Kustomizations, so we don't set it
  # here.
  values:
    api:
      replicaCount: 1
      image:
        # Image refs come from the cluster-config ConfigMap (CDK-managed
        # via llmsafespaces:imageRefs context). Format: ghcr.io/...:tag
        # We split into repo+tag for the chart's image template.
        repository: ${IMAGE_REPO_API}
        tag: ${IMAGE_TAG_API}
        pullPolicy: IfNotPresent
      config:
        security:
          allowedOrigins:
            - "https://${DOMAIN}"
        logging:
          level: info
          development: false
      ingress:
        # API is reached via the frontend ingress at /api; no separate
        # API ingress needed.
        enabled: false

    controller:
      replicaCount: 1
      image:
        repository: ${IMAGE_REPO_CONTROLLER}
        tag: ${IMAGE_TAG_CONTROLLER}
        pullPolicy: IfNotPresent
      inferenceRelay:
        enabled: false

    # See lenaxia/LLMSafeSpaces#474: chart default points at maintainer's
    # private relay (relay.safespaces.dev). Empty → workspace agent
    # routes directly to opencode.ai/zen/v1 with the public anonymous key.
    inferenceRelayURL: ""

    frontend:
      enabled: true
      image:
        repository: ${IMAGE_REPO_FRONTEND}
        tag: ${IMAGE_TAG_FRONTEND}
        pullPolicy: IfNotPresent
      ingress:
        enabled: true
        className: alb
        host: ${DOMAIN}
        # Chart's frontend-ingress.yaml hardcodes a `tls:` block for
        # the nginx-ingress + cert-manager pattern. ALB terminates TLS
        # via the certificate-arn annotation, not a K8s Secret.
        tls: false
        annotations:
          kubernetes.io/ingress.class: alb
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
          alb.ingress.kubernetes.io/ssl-redirect: '443'
          alb.ingress.kubernetes.io/healthcheck-path: /livez
          alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERT_ARN}
          # Group this Ingress with the vm-stack Grafana Ingress into
          # ONE ALB (saves ~$16/mo of a second ALB). AWS LBC unions
          # inbound-cidrs across all Ingresses in the group, so origin
          # lock applies to both hostnames automatically.
          #
          # WARNING: adding this to an existing solo Ingress causes LBC
          # to migrate to a new ALB (new DNS name). CF DNS records must
          # be updated after migration.
          alb.ingress.kubernetes.io/group.name: llmsafespaces
          # ---- Origin lock: only Cloudflare's edge IPs may hit the ALB. ----
          # Enabled 2026-07-02 as part of the CF cutover — see
          # docs/runbooks/cloudflare-cutover.md#step-a10 for the procedure
          # and #step-a11 for verification.
          #
          # Rollback: remove these two annotations and Flux-reconcile;
          # AWS LBC restores the SG's 0.0.0.0/0 :443 rule within ~30-60s.
          # If you rollback WITHOUT also disabling the CF proxy, the
          # site keeps working — CF continues to fetch from the ALB and
          # the ALB just accepts anyone. Only pair with proxy disable
          # if you're fully reverting to DNS-only.
          #
          # CIDR list source: kubernetes/apps/llmsafespaces/llmsafespaces/app/cloudflare-ip-ranges.yaml
          # (documented ConfigMap; snapshot from https://www.cloudflare.com/ips-v4/
          # + ips-v6/ on 2026-07-02). Keep this list in sync with the
          # ConfigMap on any Cloudflare IP-range change.
          #
          # NB: AWS LBC creates ONE ALB SG per ALB (regardless of how many
          # Ingresses share the group via group.name). Setting inbound-cidrs
          # on ANY Ingress in the group applies to the shared SG; setting
          # it on multiple Ingresses in the same group with different values
          # merges them (union of sets).
          alb.ingress.kubernetes.io/inbound-cidrs: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"
          alb.ingress.kubernetes.io/inbound-ipv6-cidrs: "2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"

    runtimeEnvironments:
      base:
        image:
          repository: ${IMAGE_REPO_BASE}
          tag: ${IMAGE_TAG_BASE}

    mcp:
      enabled: false

    postgresql:
      host: ${POSTGRES_HOST}
      port: 5432
      # `llmsafespaces_admin` matches rds.Credentials.fromGeneratedSecret
      # in DataStack.
      user: llmsafespaces_admin
      database: llmsafespaces
      sslMode: require

    redis:
      host: ${VALKEY_HOST}
      port: 6379
      db: 0

    externalSecret:
      create: false
      existingSecret: llmsafespaces-credentials

    crds:
      install: true

    # Cluster-scoped RBAC. Namespace-scoped breaks the controller's
    # cluster-wide informer (lenaxia/LLMSafeSpaces#469).
    rbac:
      scope: cluster

    webhooks:
      enabled: true
      # See `install.remediation` comment above — Fail on steady state.
      failurePolicy: Ignore
      allowedImageRegistries:
        - "ghcr.io/lenaxia/"

    networkPolicy:
      enabled: true
      # Cilium CiliumNetworkPolicy (workspace-egress-allowlist in
      # policy/workspace-egress.yaml) is the authoritative egress control
      # for workspace pods. The chart's built-in workspace-egress NP
      # would union with the CNP and widen effective egress to whatever
      # its allowlist permits (0.0.0.0/0 minus RFC1918 by default),
      # defeating the FQDN-only allowlist we want. Disable it here so
      # the CNP is the sole authority. See:
      #   docs/runbooks/cilium-migration.md gotcha #10
      workspaceEgress:
        enabled: false

    # Cloudflare Turnstile — CAPTCHA on /register (US-63.x).
    # Widget + secret provisioned out-of-band 2026-07-04:
    #   sitekey  = 0x4AAAAAADvViBYSywlB8kIb
    #   secret   = arn:aws:secretsmanager:us-west-2:572169125554:secret:
    #                llmsafespaces/turnstile-secret-y6JKHm
    # ExternalSecret 'llmsafespaces-credentials' pulls the secret into
    # the K8s Secret at key 'turnstile-secret' (see externalsecret/externalsecret.yaml).
    # Site key is public and lives in cluster-config as TURNSTILE_SITE_KEY,
    # substituted here via Flux postBuild.
    turnstile:
      enabled: true
      siteKey: ${TURNSTILE_SITE_KEY}
      secretKey:
        existingSecret: llmsafespaces-credentials
        key: turnstile-secret

    monitoring:
      enabled: false

    gvisor:
      enabled: true
      defaultRuntimeClass: gvisor
