---
# Workaround for lenaxia/LLMSafeSpaces#469: controller runs cluster-scoped
# ConfigMap informer but the chart's ClusterRole doesn't include cluster
# ConfigMap access. Without this, the free-models refresher logs
# "configmaps is forbidden at the cluster scope" every reconcile and
# the free-tier catalog never refreshes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llmsafespaces-controller-cm
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llmsafespaces-controller-cm
subjects:
  - kind: ServiceAccount
    name: llmsafespaces-controller
    namespace: llmsafespaces
roleRef:
  kind: ClusterRole
  name: llmsafespaces-controller-cm
  apiGroup: rbac.authorization.k8s.io
