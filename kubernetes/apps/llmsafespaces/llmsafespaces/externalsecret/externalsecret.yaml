---
# ExternalSecret materializes `llmsafespaces-credentials` from AWS
# Secrets Manager. The chart's externalSecret.existingSecret points
# at this K8s Secret name.
#
# SM ARNs are baked in via Flux postBuild substitution from
# cluster-config (CDK-created ConfigMap exposing the ARNs as
# POSTGRES_SECRET_ARN, JWT_SECRET_ARN, etc.).
#
# Secret format mapping:
#   - RDS-managed secret is JSON {"username":..., "password":..., ...}
#     → extract the `password` key only
#   - JWT/master/internal-token/inference-relay are plain-string secrets
#     → use property: "" / no property to take the whole value
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llmsafespaces-credentials
  namespace: llmsafespaces
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-sm
  target:
    name: llmsafespaces-credentials
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          # Keep through helm uninstall — chart pre-install hook would
          # otherwise re-generate with bad values.
          helm.sh/resource-policy: keep
      type: Opaque
      data:
        # redis-password is empty: Valkey runs without auth (TLS would
        # require chart support not yet present, lenaxia/LLMSafeSpaces#465).
        redis-password: ""
        # The rest come from data fetches below.
        postgres-password: "{{ .pgpass }}"
        jwt-secret: "{{ .jwt }}"
        master-secret: "{{ .master }}"
        internal-token: "{{ .internal }}"
        inference-relay-secret: "{{ .relay }}"
  data:
    - secretKey: pgpass
      remoteRef:
        key: "${POSTGRES_SECRET_ARN}"
        property: password
    - secretKey: jwt
      remoteRef:
        key: "${JWT_SECRET_ARN}"
    - secretKey: master
      remoteRef:
        key: "${MASTER_SECRET_ARN}"
    - secretKey: internal
      remoteRef:
        key: "${INTERNAL_TOKEN_ARN}"
    - secretKey: relay
      remoteRef:
        key: "${INFERENCE_RELAY_SECRET_ARN}"
